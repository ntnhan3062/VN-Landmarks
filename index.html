<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN-Landmarks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        html, body {
            overflow: hidden;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        body {
            min-width: 300px;
            min-height: 500px;
            background-color: #eee;
            display: flex;
            flex-direction: row;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            height: 100vh;
            transition: all 0.4s ease;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        #menu, #viewer {
            display: none;
            background-color: white;
            border-radius: 20px;
            padding: 10px;
            box-sizing: border-box;
            height: 100%;
            min-height: 480px;
            min-width: 280px;
            margin: 0;
            box-shadow: 5px 5px 12px rgba(0, 0, 0, 0.3);
        }
        #menu {
            visibility: visible;
            width: 300px;
            flex-direction: column;
        }
        #viewer {
            flex: 3;
            gap: 10px;
            flex-direction: row;
            margin-bottom: 10px;
            background-color: white;
            transition: all 0.4s ease;
            position: relative;
        }
        body.menu-open #viewer {
            transform: scale(0.8);
            border-radius: 30px;
        }
        #image {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
        }
        #video {
            display: none;
            width: 100%;
            height: 100%;
        }
        .btn-menu {
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            border-radius: 50%;
            height: 30px;
            width: 30px;
            padding: 8px;
            cursor: pointer;
            display: none;
            box-shadow: 1px 1px 3px 2px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            z-index: 1001;
        }
        .btn-menu:hover {
            box-shadow: none;
        }
        .btn-menu.active {
            transform: rotate(calc(360deg * 1));
            top: 15px;
            left: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.0);
            background-color: rgba(0, 0, 0, 0);
        }
        #overlay {
            position: fixed;
            visibility: hidden;
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
        }
        @media (max-width: 300px), (max-height: 500px) {
            html {
                overflow: auto; /* Cho phép cuộn */
                -webkit-overflow-scrolling: touch;
            }
        }
        @media (max-width: 330px) {
            #menu {width: calc(100vw - 10px);}
            .btn-menu.active {
                top: 15px;
                left: 15px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.0);
            }
        }
        @media (max-width: 750px) {
            #menu {
                visibility: hidden;
                position: absolute;
                top: 0;
                left: 0;
                margin: 5px;
                height: calc(100% - 10px);
                transform: translateX(-100%);
                z-index: 999;
            }
            #menu.active {
                visibility: visible;
                transform: translateX(0);
                animation: open-menu 0.4s ease forwards;
            }
            #menu.closing {
                animation: close-menu 0.4s ease forwards;
            }
            #overlay.active {
                visibility: visible;
                animation: overlay-on 0.4s ease forwards;
            }
            #overlay.closing {
                animation: overlay-off 0.4s ease forwards;
            }
        }
        @keyframes overlay-on {
            0%{opacity: 0;}
            100%{opacity: 1;}
        }
        @keyframes overlay-off {
            0%{opacity: 1;}
            100%{opacity: 0;}
        }
        @keyframes open-menu {
            0%{transform: translateX(-100%);}
            100%{transform: translateX(0);}
        }
        @keyframes close-menu {
            0% {transform: translateX(0);}
            100% {transform: translateX(-100%);}
        }
        .file-table-container {
            flex: 1;
            overflow: hidden;
            display: flex;
        }
        .file-table {
            min-width: 150px;
            width: 100%;
            border-collapse: collapse;
            background: transparent;
            font-size: 20px;
            display: flex;
            flex-direction: column;
        }
        .file-table thead {
            display: block;
            width: 100%;
        }
        .file-table thead tr {
            display: flex;
            width: 100%;
        }
        .file-table thead th {
            text-align: center;
            padding: 15px 10px;
            flex: 1; /* Chia đều không gian */
            box-sizing: border-box;
        }
        .file-table thead th {
            border-bottom: 2px solid rgba(0,0,0,1);
        }
        .file-table td {
            text-align: center;
            padding: 15px 10px;
            vertical-align: middle;
            flex: 1;
            box-sizing: border-box;
        }
        .file-table tbody {
            display: block;
            height: 100%;
            overflow-y: auto;
            scrollbar-width: none;
            width: 100%;
        }
        .file-table tbody::-webkit-scrollbar {
            display: none;
        }
        .file-table tbody tr {
            border-bottom: 2px solid rgba(0,0,0,0.2);
            display: flex;
            width: 100%;
        }
        .file-table tbody tr:last-child {
            border-bottom: none;
        }
        .file-table tbody tr.btn-row {
            cursor: pointer;
            transition: background-color 0.16s ease, transform 0.06s ease;
            user-select: none;
        }
        .file-table tbody tr.btn-row:hover {
            background-color: rgba(0,0,0,0.04);
        }
        .file-table tbody tr.btn-row:active {
            transform: translateY(0px);
        }
        .file-table tbody tr.btn-row.selected {
            border: 1px solid rgb(0, 204, 255);
            background-color: rgba(27, 209, 255, 0.34);
        }
        #img-control {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 10px;
        }
        #img-control i:hover {
            background-color: rgba(220, 220, 220, 0.5);
        }
        #img-control i{
            justify-content: center;
            align-items: center;
            text-align: center;
            display: flex;
            background: rgb(220, 220, 220);
            border-radius: 15px;
            height: 30px;
            width: 30px;
            padding: 8px 8px;
            font-style: normal !important;
            cursor: pointer;
        }
        #img-control i#zoom-default {
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.5;
        }
        #img-control i input {
            height: 100%;
            width: 100%;
            font-size: 30px;
            margin: 0;
            border: none;
            background: transparent;
            outline: none;
            text-align: center;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        #img-control i input:focus {
            background-color: white;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 15px;
        }
        #img-zoom {
            position: relative;
            text-align: center;
            height: 100%;
            width: 99%;
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            background-color: #f0f0f0;
            touch-action: none;
        }
        #img-view {
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: 50% 50%;
        }
        #img-view, #svg-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 50% 50%;
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        #img-view:active {
            cursor: grabbing;
        }
        #svg-container svg {
            pointer-events: all;
        }
        video, iframe {
            border-radius: 20px;
            height: 100%;
            width: 100%;
            flex: 1;
            margin: 0;
        }
        #home {
            display: block;
            min-width: fit-content;
            width: fit-content;
            height: fit-content;
            padding: 5px;
            text-align: center;
            background-color: rgb(0, 115, 255);
            color: white;
            border-radius: 10px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: auto;
            flex-grow: 1;
        }
        #home:hover {
            background-color: rgb(0, 96, 214);
        }
        #select-location {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .location-item {
            background-color: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 5px 5px 12px rgba(0, 0, 0, 0.2);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .location-item:hover {
            transform: translateY(-5px);
            box-shadow: 5px 10px 15px rgba(0, 0, 0, 0.3);
        }
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            padding: 5px 15px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            overflow: visible;
        }
        .video-controls button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }
        .timeline-container {
            flex: 1;
            cursor: pointer;
            height: 15px;
            display: flex;
            align-items: center;
            overflow: visible;
        }
        .timeline-track {
            position: relative;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 2.5px;
            overflow: visible;
        }
        .timeline-progress {
            height: 5px;
            width: var(--progress-width, 0%);
            border-radius: 2.5px;
            position: absolute;
            background-color: #00a1ff;
            transition: width .08s ease;
        }
        .timeline-track::after {
            content: '';
            position: absolute;
            left: var(--progress-width, 0%);
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            z-index: 5;
            transition: left .08s ease;
        }
        .timeline-tooltip {
            position: absolute;
            bottom: 20px;
            left: var(--progress-width, 0%);
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 14px;
            white-space: nowrap;
            display: none;
            z-index: 10;
            transition: left .08s ease;
        }
        .time-display {
            color: white;
            font-size: 14px;
            margin: 0 10px;
        }
        .volume-container {
            display: flex;
            align-items: center;
        }
        .volume-container input[type="range"] {
            width: 70px;
        }
        #home span { display: inline; }
        #home i { display: none; }
        @media (max-width: 750px) {
            #home span { display: none; }
            #home i { display: inline; }
        }
        .menu-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 5px 5%;
            gap: 10px;
        }
        #refresh {
            display: block;
            min-width: fit-content;
            height: fit-content;
            padding: 5px;
            text-align: center;
            background-color: rgb(0, 115, 255);
            color: white;
            border-radius: 10px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #refresh:hover {
            background-color: rgb(0, 96, 214);
        }
        #video.hide-cursor {
            cursor: none;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-radius: 20px;
        }
        #svg-tooltip {
            position: absolute;
            top: 0;
            left: 0;
            width: fit-content;
            min-width: 100px;
            max-width: 350px;
            height: fit-content;
            min-height: 25px;
            background: rgba(0, 0, 0, 0.8);
            transition: opacity .1s ease;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            padding: 5px;
            z-index: 10;
            opacity: 0;
            display: none;
            align-items: center;
            pointer-events: none;
            white-space: pre-line;
        }
        svg .object {
            cursor: pointer;
            transition: all 0.2s ease;
            stroke-linejoin: round;
        }
        .spinner {
            /* border: 8px solid #f3f3f3; */
            /* border-top: 8px solid rgb(0, 115, 255); */
            background: conic-gradient(
                from 0deg,
                #f3f3f3 150deg,
                #f3f3f3 150deg,
                rgba(0, 115, 255, 1) 210deg,
                rgba(0, 115, 255, 1) 320deg,
                #f3f3f3 360deg
            );
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin .3s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #btn-change-mode-img {
            justify-content: center;
            align-items: center;
            display: none;
            position: absolute;
            top: 6px;
            right: 10px;
            background: #fff;
            opacity: 0.75;
            border-radius: 50%;
            height: 40px;
            width: 40px;
            padding: 0;
            cursor: pointer;
            box-shadow: 0 0 3px 2px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            z-index: 80;
        }
    </style>
</head>
<body>
    <div id="select-location"></div><div id="overlay"></div>
    <i class="fa fa-bars fa-2x btn-menu" aria-hidden="true"></i>
    <div id="menu"><h3 style="text-align: center;width: 100%;font-size: 30px; margin-top: 5px;margin-bottom: 5px;">FILE</h3><div class="menu-controls"><button id="home"><i class="fa fa-home fa-x" aria-hidden="true"></i> <span>Trang chủ</span></button><button id="refresh">Làm mới các file</button></div><div class="file-table-container"><table class="file-table" role="table" aria-label="Danh sách file"><thead><tr><th scope="col">Type</th><th scope="col">File id</th></tr></thead><tbody></tbody></table></div></div>
    <div id="viewer"><div id="svg-tooltip"></div>
        <div id="loading-overlay" style="display: none;"><div class="spinner"></div></div>
        <div id="message" style="height: 100%;width: 100%; text-align: center;   display: flex;  align-items: center;  justify-content: center; font-size: 30px;">Chọn 1 file để xem.</div>
        <div id="image" style="display: none;">
            <i class="fa fa-info-circle fa-2x" id="btn-change-mode-img" aria-hidden="true"></i>
            <div id="img-zoom"><img id="img-view"><div id="svg-container"></div></div>
            <div id="img-control"><i class="fa fa-search-plus fa-2x" title= "Phóng to" id="zoom-in" aria-hidden="true"></i><i class="fa fa-search-minus fa-2x" title= "Thu nhỏ" id="zoom-out" aria-hidden="true"></i><i class="fa fa-search fa-2x" title= "Phóng cho vừa" id="zoom-default" aria-hidden="true"></i><i style="width: 125px;"><input type="number" id="image-size-text" min="10" max="1000" value="100"><span style="font-size: 30px; min-width: 35px; width: 35px;">%</span></i></div>
        </div>
        <div id="video">
            <video id="video-player-1" class="video-player" preload="auto" style="opacity: 1;"><source type="video/mp4"></video>
            <video id="video-player-2" class="video-player" preload="auto" style="opacity: 0;"><source type="video/mp4"></video>
            <div class="video-controls">
                <button id="play-pause-btn"><i class="fa fa-play"></i></button>
                <div class="time-display"><span id="current-time">00:00</span> / <span id="total-time">00:00</span></div>
                <div class="timeline-container" style="margin: 0 15px;"><div class="timeline-track"><div class="timeline-tooltip">00:00</div><div class="timeline-progress"></div></div></div>
                <div class="volume-container"><button id="mute-btn"><i class="fa fa-volume-up"></i></button><input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1"></div>
                <button id="fullscreen-btn"><i class="fa fa-expand"></i></button>
            </div>
        </div>
    </div>
    <script>
        let ALL_DATA = {};
        const style = document.createElement('style');
        style.textContent = `
            .video-player {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                transition: none !important;
            }
        `;
        document.head.appendChild(style);
        const videoPlayers = [];
        let activePlayerIndex = 0;
        const getActivePlayer = () => videoPlayers[activePlayerIndex];
        const getInactivePlayer = () => videoPlayers[1 - activePlayerIndex];
        const swapPlayers = () => {
            activePlayerIndex = 1 - activePlayerIndex;
            const activePlayer = getActivePlayer();
            const inactivePlayer = getInactivePlayer();
            activePlayer.style.opacity = 1;
            inactivePlayer.style.opacity = 0;
        };
        let CURRENT_LOCATION_KEY = null;
        let videoPlaylist = [];
        let currentVideoIndex = 0;
        let videoDurations = [];
        let totalVideoDuration = 0;
        let isHome = true;
        let imageViewer = null;
        let currentLoadId = 0;
        let svgTooltipDisplayNoneTimer = null;
        let menuDisplayNoneTimer = null;
        let isSvgInteractiveMode = false;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.matchMedia('(pointer: coarse)').matches);
        function showLoader() {document.getElementById('loading-overlay').style.display = 'flex'}
        function hideLoader() {document.getElementById('loading-overlay').style.display = 'none'}
        function hideLoader(loadId) {if (loadId === currentLoadId) {document.getElementById('loading-overlay').style.display = 'none'}}
        function createLocationSelectionScreen(data) {
            const selectLocationDiv = document.getElementById('select-location');
            selectLocationDiv.innerHTML = '';
            for (const key in data) {
                const location = data[key];
                const locationItem = document.createElement('div');
                locationItem.className = 'location-item';
                locationItem.textContent = location.name;
                locationItem.setAttribute('data-location-key', key);
                locationItem.addEventListener('click', () => {
                    CURRENT_LOCATION_KEY = key;
                    const url = new URL(window.location);
                    url.searchParams.set('location', key);
                    window.history.pushState({ path: url.href }, '', url.href);
                    showMainUI();
                    initializeFileTable(location.items, key);
                });
                selectLocationDiv.appendChild(locationItem);
            }
        }
        function showLocationSelection() {
            isHome = true;
            document.getElementById('select-location').style.display = 'flex';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('viewer').style.display = 'none';
            document.querySelector('.btn-menu').style.display = 'none';
        }
        function showMainUI() {
            isHome = false;
            document.getElementById('select-location').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('viewer').style.display = 'flex';
            const menu = document.getElementById('menu');
            if (window.innerWidth <= 750) {
                document.querySelector('.btn-menu').style.display = 'flex';
                menu.style.visibility = 'hidden';
                menu.style.transform = 'translateX(-100%)';
            } else {
                document.querySelector('.btn-menu').style.display = 'none';
                menu.style.visibility = 'visible';
                menu.style.transform = 'translateX(0)';
            }
        }
        function initializeFileTable(items, locationKey) {
            const tbody = document.querySelector('.file-table tbody');
            tbody.innerHTML = '';
            items.forEach(itemArray => {
                const row = document.createElement('tr');
                row.className = 'btn-row';
                row.setAttribute('tabindex', '0');
                let type;
                const fileName = itemArray[0].toLowerCase();
                if (itemArray.length > 1 || fileName.endsWith('.mp4')) {type = 'Video'}
                else if (fileName.endsWith('.svg')) {type = 'S-Image'}
                else if (fileName.endsWith('.jpg') || fileName.endsWith('.png')) {type = 'Image'}
                else {type = 'Unknown'}
                const fileId = itemArray[0].split('.')[0];
                const path = type === 'Video' ? JSON.stringify(itemArray.map(p => `data/${locationKey}/${p}`)) : `data/${locationKey}/${itemArray[0]}`;
                row.setAttribute('data-fileid', fileId);
                row.setAttribute('data-type', type);
                row.setAttribute('data-path', path);
                row.innerHTML = `<td class="type">${type}</td><td class="fileid">${fileId}</td>`;
                tbody.appendChild(row);
            });
            attachRowClickEvents();
        }
        function resetViewer() {
            currentLoadId++;
            hideLoader(currentLoadId);
            const ImageView = document.getElementById('image');
            const VideoView = document.getElementById('video');
            const messageView = document.getElementById('message');
            const imgView = document.getElementById('img-view');
            document.getElementById('svg-container').innerHTML = '';
            videoPlayers.forEach(p => { p.pause(); p.removeAttribute('src'); p.load(); });
            isSvgInteractiveMode = false; // Reset SVG interactive mode
            imgView.removeAttribute('src');
            ImageView.style.display = 'none';
            VideoView.style.display = 'none';
            messageView.style.display = 'flex';
            videoPlaylist = [];
            currentVideoIndex = 0;
            videoDurations = [];
            totalVideoDuration = 0;
            const selectedRow = document.querySelector('.btn-row.selected');
            if (selectedRow) selectedRow.classList.remove('selected');
        }
        let activeTooltip = { element: null, timer: null };
        function setupSvgTooltips() {
            const tooltip = document.getElementById('svg-tooltip');
            const objects = document.querySelectorAll('#svg-container .object');
            function hideActiveTooltip() {
                if (activeTooltip.element) {
                    clearTimeout(activeTooltip.timer);
                    objects.forEach(obj => {
                        obj.style.stroke = 'rgba(0, 148, 255, 0.1)';
                        obj.style.strokeWidth = '2px';
                    });
                    tooltip.style.opacity = '0';
                    svgTooltipDisplayNoneTimer = setTimeout(() => { tooltip.style.display = 'none' }, 100);
                    activeTooltip.element = null;
                }
            }
            objects.forEach(obj => {
                const titleText = obj.dataset.title;
                if (!titleText) return;
                if (isTouchDevice) {
                    let startX = 0;
                    let startY = 0;
                    obj.addEventListener('touchstart', (e) => {
                        e.stopPropagation();
                        const touch = e.touches[0];
                        startX = touch.clientX;
                        startY = touch.clientY;
                    });
                    obj.addEventListener('touchend', (e) => {
                        e.stopPropagation();
                        const touch = e.changedTouches[0];
                        if (!touch) return;
                        const deltaX = Math.abs(touch.clientX - startX);
                        const deltaY = Math.abs(touch.clientY - startY);
                        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                        if (distance <= 6) {
                            if (activeTooltip.element === obj) {
                                hideActiveTooltip();
                                return;
                            }
                            clearTimeout(svgTooltipDisplayNoneTimer);
                            clearTimeout(activeTooltip.timer);
                            objects.forEach(obj => {
                                obj.style.stroke = 'rgba(0, 148, 255, 0.1)';
                                obj.style.strokeWidth = '2px';
                            });  
                            obj.style.stroke = 'rgba(0, 148, 255, 1)';
                            obj.style.strokeWidth = '15px';
                            const rect = obj.getBoundingClientRect();
                            tooltip.style.display = 'flex';
                            tooltip.style.maxWidth = 'auto';
                            tooltip.style.width = document.getElementById('viewer').offsetWidth-20+'px';
                            tooltip.style.left = `${document.getElementById('viewer').offsetWidth/2-tooltip.offsetWidth/2}px`;
                            tooltip.style.top = `${document.getElementById('viewer').offsetHeight/2-tooltip.offsetHeight/2}px`;
                            tooltip.style.padding = '10px 5px';
                            tooltip.style.textAlign = 'center';
                            tooltip.style.justifyContent = 'center';
                            setTimeout(() => {tooltip.textContent = titleText}, 5);
                            setTimeout(() => { tooltip.style.opacity = '1'; }, 10);
                            // tooltip.style.left = `${rect.left + rect.width / 2}px`;
                            // tooltip.style.top = `${rect.top + rect.height / 2}px`;
                            tooltip.style.transform = 'translate(0%, -50%)';
                            activeTooltip.element = obj;
                            activeTooltip.timer = setTimeout(() => {hideActiveTooltip()}, 3000);
                        }
                    });
                } else {
                    obj.addEventListener('mouseover', () => {
                        clearTimeout(svgTooltipDisplayNoneTimer);
                        tooltip.textContent = titleText;
                        tooltip.style.display = 'flex';
                        setTimeout(() => {tooltip.style.opacity = '1'}, 10);
                        obj.style.stroke = 'rgba(0, 148, 255, 1)';
                        obj.style.strokeWidth = '10px';
                    });
                    obj.addEventListener('mousemove', (e) => {
                        const viewer = document.getElementById('viewer');
                        const viewerRect = viewer.getBoundingClientRect();
                        const maxTooltipWidth = Math.min(350, viewerRect.width);
                        tooltip.style.maxWidth = `${maxTooltipWidth}px`;
                        const tooltipWidth = tooltip.offsetWidth;
                        const tooltipHeight = tooltip.offsetHeight;
                        let targetLeft = e.clientX - viewerRect.left - (tooltipWidth / 2);
                        let targetTop = e.clientY - viewerRect.top - tooltipHeight - 15;
                        if (targetLeft < 0) targetLeft = 0;
                        if (targetLeft + tooltipWidth > viewerRect.width) targetLeft = viewerRect.width - tooltipWidth;
                        if (targetTop < 0) targetTop = e.clientY - viewerRect.top + 30;
                        if (targetTop + tooltipHeight > viewerRect.height) targetTop = viewerRect.height - tooltipHeight;
                        tooltip.style.left = `${targetLeft}px`;
                        tooltip.style.top = `${targetTop}px`;
                        tooltip.style.transform = 'none';
                    });
                    obj.addEventListener('mouseout', () => {
                        tooltip.style.opacity = '0';
                        svgTooltipDisplayNoneTimer = setTimeout(() => {tooltip.style.display = 'none'}, 100);
                        obj.style.stroke = 'rgba(0, 148, 255, 0.1)';
                        obj.style.strokeWidth = '2px';
                    });
                }
            });
        }
        async function calculateVideoDurations(paths) {
            videoDurations = [];
            totalVideoDuration = 0;
            const durationPromises = paths.map(path => {
                return new Promise((resolve) => {
                    const tempVideo = document.createElement('video');
                    tempVideo.preload = 'metadata';
                    tempVideo.onloadedmetadata = () => {
                        videoDurations.push(tempVideo.duration);
                        totalVideoDuration += tempVideo.duration;
                        resolve();
                    };
                    tempVideo.onerror = () => resolve();
                    tempVideo.src = path;
                });
            });
            await Promise.all(durationPromises);
            document.getElementById('total-time').textContent = formatTime(totalVideoDuration);
        }
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function initializeVideoPlayer() {
            const videoControls = document.querySelector('.video-controls');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playPauseBtnIcon = playPauseBtn.querySelector('i');
            const timelineContainer = document.querySelector('.timeline-container');
            const volumeSlider = document.getElementById('volume-slider');
            const muteBtn = document.getElementById('mute-btn');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            let idleTimer = null;
            let isScrubbing = false;
            const timelineTooltip = document.querySelector('.timeline-track .timeline-tooltip');
            let lastVolume = 1;
            function togglePlayPause() {
                const video = getActivePlayer();
                if (video.paused) {video.play()} else {video.pause()}
            }
            playPauseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const video = getActivePlayer();
                if (video.paused) {video.play()} else {video.pause()}
            });
            function showControls() {
                videoControls.style.opacity = 1;
                videoControls.style.visibility = 'visible';
                videoContainer.classList.remove('hide-cursor');
                clearTimeout(idleTimer);
            }
            function hideControls() {
                videoControls.style.opacity = 0;
                videoControls.style.visibility = 'hidden';
                if (!('ontouchstart' in window)) {videoContainer.classList.add('hide-cursor')}
            }
            function resetIdleTimer() {
                showControls();
                idleTimer = setTimeout(() => {hideControls()}, 3000);
            }
            videoContainer.addEventListener('click', (e) => {
                if (videoControls.contains(e.target)) return;
                const isControlsVisible = videoControls.style.opacity === '1';
                if ('ontouchstart' in window) {if (isControlsVisible) {togglePlayPause()} else {resetIdleTimer()}} else {togglePlayPause();}
            });
            videoContainer.addEventListener('mousemove', resetIdleTimer);
            videoContainer.addEventListener('touchstart', resetIdleTimer, { passive: true });
            videoContainer.addEventListener('mouseleave', () => {
                hideControls();
                clearTimeout(idleTimer);
            });
            videoControls.addEventListener('mouseenter', showControls);
            function handleScrub(e) {
                e.preventDefault();
                const rect = timelineContainer.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                const seekTime = totalVideoDuration * percentage;
                timelineTooltip.style.display = 'block';
                timelineTooltip.textContent = formatTime(seekTime); 
                document.querySelector('.timeline-progress').style.width = `${percentage * 100}%`;
                document.querySelector('.timeline-track').style.setProperty('--progress-width', `${percentage * 100}%`);
            }
            function seekToPosition(e) {
                const rect = timelineContainer.getBoundingClientRect();
                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                const seekTime = totalVideoDuration * percentage;
                let cumulativeDuration = 0;
                for (let i = 0; i < videoDurations.length; i++) {
                    if (seekTime <= cumulativeDuration + videoDurations[i]) {
                        const newSeekTimeInSegment = seekTime - cumulativeDuration;
                        if (currentVideoIndex !== i) {
                            currentVideoIndex = i;
                            swapPlayers();
                            const newActivePlayer = getActivePlayer();
                            const oldPlayer = getInactivePlayer();
                            oldPlayer.pause();
                            newActivePlayer.volume = oldPlayer.volume;
                            newActivePlayer.muted = false;
                            newActivePlayer.src = videoPlaylist[i];
                            newActivePlayer.currentTime = newSeekTimeInSegment;
                            preloadNextSegment();
                        } else {getActivePlayer().currentTime = newSeekTimeInSegment}
                        getActivePlayer().play().catch(err => { if (err.name !== 'AbortError') console.error("Seek play error:", err) });
                        return;
                    }
                    cumulativeDuration += videoDurations[i];
                }
            }
            function onScrubEnd(e) {
                if (!isScrubbing) return;
                isScrubbing = false;
                timelineTooltip.style.display = 'none';
                document.body.style.cursor = 'default';
                seekToPosition(e);
                window.removeEventListener('mousemove', handleScrub);
                window.removeEventListener('mouseup', onScrubEnd);
                window.removeEventListener('touchmove', handleScrub);
                window.removeEventListener('touchend', onScrubEnd);
            }
            timelineContainer.addEventListener('mousedown', (e) => {
                isScrubbing = true;
                timelineTooltip.style.display = 'block';
                document.body.style.cursor = 'grabbing';
                handleScrub(e);
                window.addEventListener('mousemove', handleScrub);
                window.addEventListener('mouseup', onScrubEnd);
            });
            timelineContainer.addEventListener('touchstart', (e) => {
                isScrubbing = true;
                timelineTooltip.style.display = 'block';
                handleScrub(e);
                window.addEventListener('touchmove', handleScrub);
                window.addEventListener('touchend', onScrubEnd);
            }, {passive: false});
            timelineContainer.addEventListener('click', (e) => {if (!isScrubbing) {seekToPosition(e)}});
            volumeSlider.addEventListener('click', e => e.stopPropagation());
            volumeSlider.addEventListener('input', e => {
                const newVolume = parseFloat(e.target.value);
                videoPlayers.forEach(p => p.volume = newVolume);
                if (newVolume > 0) {lastVolume = newVolume}
            });
            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const activePlayer = getActivePlayer();
                if (!activePlayer) return;
                const currentVolume = activePlayer.volume;
                const newVolume = currentVolume > 0 ? 0 : (lastVolume > 0 ? lastVolume : 1);
                videoPlayers.forEach(p => p.volume = newVolume);
                volumeSlider.value = newVolume;
            });
            videoPlayers.forEach((player, index) => {
                player.addEventListener('play', () => {if (player === getActivePlayer()) playPauseBtnIcon.className = 'fa fa-pause'});
                player.addEventListener('pause', () => {if (player === getActivePlayer()) playPauseBtnIcon.className = 'fa fa-play'});
                player.addEventListener('timeupdate', () => {
                    if (player !== getActivePlayer() || isScrubbing) return;
                    let durationPlayed = 0;
                    if (videoDurations.length === 0) return;
                    for (let i = 0; i < currentVideoIndex; i++) {durationPlayed += videoDurations[i]}
                    const totalCurrentTime = durationPlayed + player.currentTime;
                    document.getElementById('current-time').textContent = formatTime(totalCurrentTime);
                    const progressPercent = (totalCurrentTime / totalVideoDuration) * 100;
                    document.querySelector('.timeline-progress').style.width = `${Math.min(100, progressPercent)}%`;
                    document.querySelector('.timeline-track').style.setProperty('--progress-width', `${Math.min(100, progressPercent)}%`);
                });
                player.addEventListener('timeupdate', () => {
                    if (player !== getActivePlayer()) return;
                    if (player.duration && player.currentTime > player.duration - 0.25) {handleSeamlessTransition()}
                });
                player.addEventListener('ended', () => {
                    if (player !== getActivePlayer()) return;
                    if (currentVideoIndex < videoPlaylist.length - 1) {
                        swapPlayers();
                        const newActivePlayer = getActivePlayer();
                        const oldPlayer = getInactivePlayer();
                        oldPlayer.pause();
                        newActivePlayer.play();
                        newActivePlayer.style.opacity = 1;
                        oldPlayer.style.opacity = 0;
                        currentVideoIndex++;
                        preloadNextSegment();
                    } else {
                        if (currentVideoIndex === videoPlaylist.length - 1) {
                            playPauseBtnIcon.className = 'fa fa-play';
                            currentVideoIndex = 0;
                            const activePlayer = getActivePlayer();
                            activePlayer.src = videoPlaylist[0];
                            activePlayer.load();
                        }
                    };
                });
                player.addEventListener('volumechange', () => {
                    const activePlayer = getActivePlayer();
                    const muteBtnIcon = muteBtn.querySelector('i');
                    const currentVolume = activePlayer.volume;
                    muteBtnIcon.style.marginRight = '0px';
                    if (currentVolume === 0) {
                        muteBtnIcon.className = 'fa fa-volume-off';
                        muteBtnIcon.style.marginRight = '10px';
                    } else if (currentVolume <= 0.4) {
                        muteBtnIcon.className = 'fa fa-volume-down';
                        muteBtnIcon.style.marginRight = '6px';
                    } else {muteBtnIcon.className = 'fa fa-volume-up'}
                });
                player.addEventListener('waiting', () => {if (player === getActivePlayer()) showLoader()});
                player.addEventListener('playing', () => {if (player === getActivePlayer()) {hideLoader(currentLoadId)}});
            });
            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!document.fullscreenElement) {videoContainer.requestFullscreen().catch(err => console.error(err));}
                else {document.exitFullscreen()}
            });
            document.addEventListener('fullscreenchange', () => {
                const fullscreenIcon = fullscreenBtn.querySelector('i');
                if (document.fullscreenElement) {
                    fullscreenIcon.classList.remove('fa-expand');
                    fullscreenIcon.classList.add('fa-compress');
                } else {
                    fullscreenIcon.classList.remove('fa-compress');
                    fullscreenIcon.classList.add('fa-expand');
                }
            });
        }
        function preloadNextSegment() {
            const nextIndex = currentVideoIndex + 1;
            if (nextIndex < videoPlaylist.length) {
                const inactivePlayer = getInactivePlayer();
                inactivePlayer.muted = true; // Luôn tắt tiếng trình phát ẩn
                inactivePlayer.src = videoPlaylist[nextIndex];
                inactivePlayer.load();
            }
        }
        function initializeImageViewer() {
            const imgView = document.getElementById('img-view');
            const imgContainer = document.getElementById('img-zoom');
            const zoomInput = document.getElementById('image-size-text');
            let scale = 1, baseScale = 1;
            let translateX = 0, translateY = 0;
            let isDragging = false, isPinching = false;
            let startX, startY, startTranslateX, startTranslateY;
            const svgContainer = document.getElementById('svg-container');
            
            // New variables for touch handling
            let isTapCandidate = false;
            let tapStartX = 0;
            let tapStartY = 0;

            function applyTransform() {
                const transformValue = `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${scale})`;
                imgView.style.transform = transformValue;
                if (svgContainer.firstChild) svgContainer.style.transform = transformValue;
            }
            function adjustBounds() {
                const containerRect = imgContainer.getBoundingClientRect();
                const currentWidth = (imgView.naturalWidth || imgView.width.baseVal.value) * scale;
                const currentHeight = (imgView.naturalHeight || imgView.height.baseVal.value) * scale;
                const xBound = Math.max(0, (currentWidth - containerRect.width) / 2);
                const yBound = Math.max(0, (currentHeight - containerRect.height) / 2);
                translateX = Math.max(-xBound, Math.min(xBound, translateX));
                translateY = Math.max(-yBound, Math.min(yBound, translateY));
                applyTransform();
            }
            function updateZoom(newScale, pivotX, pivotY) {
                const rect = imgContainer.getBoundingClientRect();
                const oldScale = scale;
                scale = Math.max(baseScale * 0.1, Math.min(newScale, baseScale * 10));
                const pivotPointX = pivotX - rect.left - rect.width / 2;
                const pivotPointY = pivotY - rect.top - rect.height / 2;
                const scaleRatio = scale / oldScale;
                translateX = (translateX - pivotPointX) * scaleRatio + pivotPointX;
                translateY = (translateY - pivotPointY) * scaleRatio + pivotPointY;
                applyTransform();
                adjustBounds();
                zoomInput.value = Math.round((scale / baseScale) * 100);
                const zoomIn = document.getElementById('zoom-in');
                const zoomOut = document.getElementById('zoom-out');
                const zoomDefault = document.getElementById('zoom-default');
                const zoomInputValue = parseInt(zoomInput.value, 10);
                function toggleElementState(element, isDisabled) {
                    element.style.opacity = isDisabled ? 0.5 : 1;
                    element.style.cursor = isDisabled ? 'not-allowed' : 'pointer';
                    element.style.pointerEvents = isDisabled ? 'none' : 'auto';
                }
                toggleElementState(zoomOut, zoomInputValue === 10);
                toggleElementState(zoomDefault, zoomInputValue === 100);
                toggleElementState(zoomIn, zoomInputValue === 1000);
            }
            function resetAndRecalculateLayout() {
                let naturalWidth, naturalHeight;
                const isSvgImage = svgContainer.querySelector('svg');
                if (isSvgImage) {
                    const viewBox = isSvgImage.viewBox.baseVal;
                    naturalWidth = viewBox.width;
                    naturalHeight = viewBox.height;
                } else if (imgView.naturalWidth > 0) {
                    naturalWidth = imgView.naturalWidth;
                    naturalHeight = imgView.naturalHeight;
                }
                if (naturalWidth <= 0 || naturalHeight <= 0) {
                    console.warn("Image or SVG dimensions are invalid (<= 0). Cannot calculate baseScale.");
                    baseScale = 1;
                    scale = baseScale;
                    translateX = 0;
                    translateY = 0;
                    applyTransform();
                    zoomInput.value = 100;
                    return;
                }
                const containerRect = imgContainer.getBoundingClientRect();
                baseScale = Math.min(containerRect.width / naturalWidth, containerRect.height / naturalHeight); scale = baseScale; translateX = 0; translateY = 0; applyTransform(); zoomInput.value = 100;
            }
            imgView.onload = () => {
                const isSvg = svgContainer.querySelector('svg');
                resetAndRecalculateLayout();
                if (isSvg) {
                    svgContainer.style.width = `${imgView.clientWidth}px`;
                    svgContainer.style.height = `${imgView.clientHeight}px`;
                }
                hideLoader(currentLoadId);
            };
            imgView.onerror = () => hideLoader(currentLoadId);
            new ResizeObserver(resetAndRecalculateLayout).observe(imgContainer);
            imgContainer.addEventListener('mousedown', (e) => {e.preventDefault(); isDragging = true; startX = e.clientX; startY = e.clientY; startTranslateX = translateX; startTranslateY = translateY; imgView.style.transition = 'none'; if (svgContainer.firstChild) svgContainer.style.transition = 'none';});
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = startTranslateX + (e.clientX - startX);
                translateY = startTranslateY + (e.clientY - startY);
                applyTransform();
            });
            window.addEventListener('mouseup', () => {
                if (!isDragging) return;
                isDragging = false;
                if (svgContainer.firstChild) svgContainer.style.transition = 'transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                imgView.style.transition = 'transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                adjustBounds();
            });
            imgContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                updateZoom(scale * delta, e.clientX, e.clientY);
            });
            document.getElementById('zoom-in').addEventListener('click', () => {
                if (isSvgInteractiveMode) return;
                const rect = imgContainer.getBoundingClientRect();
                updateZoom(scale * 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
            document.getElementById('zoom-out').addEventListener('click', () => {
                if (isSvgInteractiveMode) return;
                const rect = imgContainer.getBoundingClientRect();
                updateZoom(scale / 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
            document.getElementById('zoom-default').addEventListener('click', () => {
                if (isSvgInteractiveMode) return;
                const rect = imgContainer.getBoundingClientRect();
                updateZoom(baseScale, rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
            zoomInput.addEventListener('change', () => {
                if (isSvgInteractiveMode) return;
                let percent = parseInt(zoomInput.value, 10);
                if (isNaN(percent) || percent < 10) percent = 10;
                if (percent > 1000) percent = 1000;
                const newScale = (percent / 100) * baseScale;
                const rect = imgContainer.getBoundingClientRect();
                updateZoom(newScale, rect.left + rect.width / 2, rect.top + rect.height / 2);
            });
            let initialDistance = null;
            let initialScale = null;
            imgContainer.addEventListener('touchstart', (e) => {
                if (isSvgInteractiveMode) return;
                imgView.style.transition = 'none';
                if (svgContainer.firstChild) svgContainer.style.transition = 'none';
                if (e.touches.length === 1) {
                    e.preventDefault();
                    isDragging = true;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    startTranslateX = translateX;
                    startTranslateY = translateY;
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    isDragging = false;
                    initialDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    initialScale = scale;
                }
            }, { passive: false }); // Explicitly set passive to false
            imgContainer.addEventListener('touchmove', (e) => {
                if (isSvgInteractiveMode) return;
                if (e.touches.length === 1) {
                    if (isTapCandidate) {
                        const currentX = e.touches[0].clientX;
                        const currentY = e.touches[0].clientY;
                        if (Math.abs(currentX - tapStartX) > moveThreshold || Math.abs(currentY - tapStartY) > moveThreshold) {
                            isTapCandidate = false;
                            isDragging = true;
                            e.preventDefault();
                        }
                    }
                    if (isDragging) {
                        e.preventDefault();
                        translateX = startTranslateX + (e.touches[0].clientX - startX);
                        translateY = startTranslateY + (e.touches[0].clientY - startY);
                        applyTransform();
                    }
                } else if (e.touches.length === 2) {
                    e.preventDefault();
                    const newDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    const factor = newDistance / initialDistance;
                    const newScale = initialScale * factor;
                    const centerX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const centerY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    updateZoom(newScale, centerX, centerY);
                }
            }, { passive: false });
            imgContainer.addEventListener('touchend', (e) => {
                if (isSvgInteractiveMode) return;
                if (isTapCandidate) {
                    const tappedObject = e.target.closest('.object');
                    if (tappedObject && window.handleSvgObjectTap) {
                        window.handleSvgObjectTap(tappedObject);
                        e.preventDefault();
                    }
                }
                isDragging = false;
                isTapCandidate = false;
                initialDistance = null;
                initialScale = null;
                if (svgContainer.firstChild) svgContainer.style.transition = 'transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                imgView.style.transition = 'transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                adjustBounds();
            });
            imgContainer.addEventListener('contextmenu', (e) => {e.preventDefault()});
        }
        function handleSeamlessTransition() {
            if (currentVideoIndex < videoPlaylist.length - 1) {
                const oldPlayer = getActivePlayer();
                swapPlayers();
                currentVideoIndex++;
                const newActivePlayer = getActivePlayer();
                newActivePlayer.muted = oldPlayer.muted;
                newActivePlayer.volume = oldPlayer.volume;
                newActivePlayer.play().catch(e => console.error("Lỗi chuyển tiếp:", e));
                newActivePlayer.style.opacity = 1;
                oldPlayer.style.opacity = 0;
                setTimeout(() => {oldPlayer.pause()}, 100);
                preloadNextSegment();
            }
        }
    </script>
